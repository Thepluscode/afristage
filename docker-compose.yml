services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: afristage
      POSTGRES_PASSWORD: afristage
      POSTGRES_DB: afristage
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afristage -d afristage"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  livekit:
    image: livekit/livekit-server:latest
    command: --dev
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: afristage
      MINIO_ROOT_PASSWORD: afristage123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # One-shot: create the media bucket and make objects publicly readable (CDN-style).
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 afristage afristage123; do sleep 1; done &&
      mc mb --ignore-existing local/afristage-media &&
      mc anonymous set download local/afristage-media
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - apps/api/.env
    environment:
      # Override host-oriented URLs from .env: inside the network, reach deps by service name.
      DATABASE_URL: postgresql://afristage:afristage@postgres:5432/afristage?schema=public
      REDIS_URL: redis://redis:6379
      LIVEKIT_URL: ws://livekit:7880
      # Object storage: reach MinIO by service name in-network; public URLs use localhost.
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: afristage-media
      S3_ACCESS_KEY_ID: afristage
      S3_SECRET_ACCESS_KEY: afristage123
      S3_FORCE_PATH_STYLE: "true"
      CDN_BASE_URL: http://localhost:9000/afristage-media
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 3s
      start_period: 25s
      retries: 5

volumes:
  postgres_data:
  minio_data:
